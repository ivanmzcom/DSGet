name: DSGet
options:
  bundleIdPrefix: com.ivanmz
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "BH4ZLEBC89"
    CODE_SIGN_STYLE: Automatic

packages:
  DSGetCore:
    path: DSGetCore

targets:
  DSGet:
    type: application
    platform: iOS
    sources:
      - path: DSGet
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: DSGetCore
      - target: iDSGet Watch App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ivanmz.DSGet
        INFOPLIST_FILE: DSGet/Info.plist
        CODE_SIGN_ENTITLEMENTS: DSGet/DSGet.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ENABLE_PREVIEWS: true
    info:
      path: DSGet/Info.plist
      properties:
        CFBundleDisplayName: DSGet
        DSGetSharedKeychainAccessGroup: $(AppIdentifierPrefix)com.ivanmz.DSGet.shared
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: DSGet/DSGet.entitlements
      properties:
        com.apple.security.application-groups:
          - group.es.ncrd.DSGet
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.ivanmz.DSGet.shared

  DSGetMac:
    type: application
    platform: macOS
    deploymentTarget:
      macOS: "15.0"
    sources:
      - path: DSGet
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: DSGetCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ivanmz.DSGet
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: DSGet/DSGetMac.entitlements
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: true

  DSGetWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: DSGetWidgets
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ivanmz.DSGetWidgets
        INFOPLIST_FILE: DSGetWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: DSGetWidgets/DSGetWidgets.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        ENABLE_PREVIEWS: true
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
    info:
      path: DSGetWidgets/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: DSGetWidgets/DSGetWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.es.ncrd.DSGet
    dependencies:
      - package: DSGetCore
      - target: DSGet
        embed: false

  iDSGet Watch App:
    type: application
    platform: watchOS
    deploymentTarget:
      watchOS: "11.0"
    sources:
      - path: iDSGet Watch App
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ivanmz.DSGet.watchkitapp
        INFOPLIST_FILE: iDSGet Watch App/Info.plist
        CODE_SIGN_ENTITLEMENTS: iDSGet Watch App/iDSGet Watch App.entitlements
        TARGETED_DEVICE_FAMILY: "4"
        SUPPORTED_PLATFORMS: "watchos watchsimulator"
        SKIP_INSTALL: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ENABLE_PREVIEWS: true
    info:
      path: iDSGet Watch App/Info.plist
      properties:
        CFBundleDisplayName: iDSGet Watch
        DSGetSharedKeychainAccessGroup: $(AppIdentifierPrefix)com.ivanmz.DSGet.shared
        ITSAppUsesNonExemptEncryption: false
        WKApplicationNavigationBarTitleText: iDSGet Watch
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.ivanmz.DSGet
    entitlements:
      path: iDSGet Watch App/iDSGet Watch App.entitlements
      properties:
        com.apple.security.application-groups:
          - group.es.ncrd.DSGet
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.ivanmz.DSGet.shared
    dependencies:
      - package: DSGetCore

  DSGetTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DSGetTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: DSGet
      - package: DSGetCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ivanmz.DSGetTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DSGet.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DSGet"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES

  DSGetUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DSGetUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: DSGet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ivanmz.DSGetUITests
        TEST_TARGET_NAME: DSGet
        GENERATE_INFOPLIST_FILE: YES

schemes:
  DSGet:
    build:
      targets:
        DSGet: all
        DSGetWidgets: all
        DSGetTests:
          - testing
        DSGetUITests:
          - testing
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DSGetTests
        - DSGetUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  DSGetMac:
    build:
      targets:
        DSGetMac: all
    run:
      config: Debug
    analyze:
      config: Debug
    archive:
      config: Release
